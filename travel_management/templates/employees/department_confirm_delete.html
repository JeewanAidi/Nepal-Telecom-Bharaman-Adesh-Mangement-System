{% extends 'base.html' %}
{% block title %}Delete Department{% endblock %}

{% block content %}
<div class="container-fluid py-3 px-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white py-2">
                    <strong><i class="bi bi-exclamation-triangle me-2"></i>Delete Department</strong>
                </div>
                <div class="card-body text-center py-4">
                    <i class="bi bi-building-x display-3 text-danger mb-3"></i>
                    <h5>Delete "{{ dept.name }}"?</h5>
                    <p class="text-muted small">This action cannot be undone. Employees in this department will have no department assigned.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                        <a href="{% url 'department_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
